<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PORTRAIT — Patient Passport (cohort)</title>
<style>
:root{
  --describe:#1b7837; --abstain:#8a5a00; --refuse:#6a1b9a;
  --ink:#1a1a1a; --muted:#555; --line:#d0d0d0; --bg:#ffffff; --panel:#f6f7f8;
  --ok:#e6f0e9; --track:#eceff1; --band:#c7d6cf; --marker:#12421f;
  --fs-base:16.5px; --radius:8px;
}
*{box-sizing:border-box}
html{font-size:var(--fs-base)}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  color:var(--ink);background:var(--bg);line-height:1.45}
body.community{--fs-base:19px}
header{position:sticky;top:0;z-index:20;background:var(--bg);border-bottom:1px solid var(--line);
  display:flex;align-items:center;gap:1rem;padding:.6rem 1rem;flex-wrap:wrap}
header h1{font-size:1.05rem;margin:0;font-weight:800;letter-spacing:.2px}
header .sub{color:var(--muted);font-size:.85rem}
.spacer{flex:1}
.toggle,.provbtn{border:1px solid var(--line);background:var(--panel);border-radius:999px;
  padding:.35rem .8rem;font-size:.9rem;cursor:pointer;color:var(--ink)}
.toggle[aria-pressed="true"]{background:#123;color:#fff;border-color:#123}
.wrap{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:0;min-height:calc(100vh - 52px)}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
.rail{border-right:1px solid var(--line);background:var(--panel);display:flex;flex-direction:column;
  max-height:calc(100vh - 52px);position:sticky;top:52px}
.main{padding:1rem 1.25rem;min-width:0}
.section{padding:.75rem 1rem;border-bottom:1px solid var(--line)}
.section h2{font-size:.8rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:.1rem 0 .5rem}
.ovgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.4rem;margin-bottom:.5rem}
.ovcell{background:var(--bg);border:1px solid var(--line);border-radius:var(--radius);padding:.45rem .5rem;text-align:center}
.ovcell .num{font-size:1.25rem;font-weight:800}
.ovcell .lab{font-size:.72rem;color:var(--muted)}
.barrow{display:flex;align-items:center;gap:.4rem;font-size:.78rem;margin:.15rem 0}
.barrow .k{width:74px;color:var(--muted)}
.barrow .bar{height:10px;background:var(--track);border-radius:5px;flex:1;overflow:hidden}
.barrow .bar>span{display:block;height:100%}
.chips{display:flex;flex-wrap:wrap;gap:.3rem}
.chip{border:1px solid var(--line);background:var(--bg);border-radius:999px;padding:.25rem .6rem;
  font-size:.8rem;cursor:pointer;color:var(--ink)}
.chip[aria-pressed="true"]{background:#123;color:#fff;border-color:#123}
label.fld{display:block;font-size:.78rem;color:var(--muted);margin:.4rem 0 .15rem}
input[type=search],select{width:100%;padding:.4rem .5rem;border:1px solid var(--line);border-radius:6px;
  font-size:.9rem;background:var(--bg);color:var(--ink)}
.count{font-size:.8rem;color:var(--muted);padding:.3rem 1rem}
.listwrap{flex:1;overflow:auto;position:relative}
.vport{position:relative;width:100%}
.row{position:absolute;left:0;right:0;display:flex;align-items:center;gap:.5rem;padding:.4rem .8rem;
  border-bottom:1px solid var(--line);cursor:pointer;background:var(--bg)}
.row:hover{background:#eef3f7}
.row[aria-selected="true"]{background:#dce9f5;outline:2px solid #123;outline-offset:-2px}
.row .pid{font-weight:700;font-size:.82rem;min-width:74px}
.row .meta{font-size:.72rem;color:var(--muted);flex:1}
.state{display:inline-flex;align-items:center;gap:.3rem;font-size:.72rem;font-weight:700;
  padding:.1rem .45rem;border-radius:999px;border:1px solid}
.badge{font-size:.68rem;background:#eee;border-radius:999px;padding:.05rem .4rem;color:#333}
.st-DESCRIBE{color:var(--describe);border-color:var(--describe);background:#eaf5ee}
.st-ABSTAIN{color:var(--abstain);border-color:var(--abstain);background:#fbf3e3}
.st-REFUSE{color:var(--refuse);border-color:var(--refuse);background:#f4ecf8}
.banner{display:flex;align-items:center;gap:.6rem;border-radius:var(--radius);padding:.7rem .9rem;margin-bottom:.5rem;
  border:1px solid;font-weight:700}
.bn-DESCRIBE{color:var(--describe);border-color:var(--describe);background:#eaf5ee}
.bn-ABSTAIN{color:var(--abstain);border-color:var(--abstain);background:#fbf3e3}
.bn-REFUSE{color:var(--refuse);border-color:var(--refuse);background:#f4ecf8}
.banner .glyph{font-size:1.3rem}
.accountability{font-size:.82rem;color:var(--muted);border-left:3px solid var(--line);padding:.3rem .7rem;margin:.3rem 0 .8rem}
.card{border:1px solid var(--line);border-radius:var(--radius);padding:.7rem .9rem;margin:.6rem 0;background:var(--bg)}
.card h3{margin:.1rem 0 .5rem;font-size:.95rem}
.card.flag{border-color:var(--describe);background:#f2f9f4}
.card.abst{border-color:var(--abstain);background:#fdf7ec}
.lead{font-size:1.02rem;margin:.2rem 0 .7rem}
ul.drivers{margin:.2rem 0;padding-left:1.1rem}
ul.drivers li{margin:.25rem 0;font-size:.9rem}
.meaning{color:var(--muted);font-size:.85rem}
table.axes{width:100%;border-collapse:collapse;font-size:.85rem;margin-top:.3rem}
table.axes th,table.axes td{text-align:left;padding:.3rem .4rem;border-bottom:1px solid #eee;vertical-align:middle}
table.axes th[scope=col]{color:var(--muted);font-size:.72rem;text-transform:uppercase;letter-spacing:.05em}
.axname{font-weight:600}
.natfreq{color:var(--muted);font-size:.75rem}
.surp{color:var(--describe);font-weight:700;font-size:.72rem;border:1px solid var(--describe);border-radius:999px;padding:0 .35rem;margin-left:.3rem}
.prov{font-size:.75rem;color:var(--muted);white-space:pre-wrap;word-break:break-all}
.hint{color:var(--muted);font-size:.8rem}
:focus-visible{outline:3px solid #2b6cb0;outline-offset:2px}
.visually-hidden{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)}
dialog{border:1px solid var(--line);border-radius:var(--radius);max-width:560px;padding:1rem 1.2rem}
dialog::backdrop{background:rgba(0,0,0,.35)}
footer{padding:.6rem 1rem;color:var(--muted);font-size:.75rem;border-top:1px solid var(--line)}
</style>
</head>
<body>
<header>
  <h1>PORTRAIT</h1>
  <span class="sub">Patient Passport &middot; describes the individual against the population</span>
  <span class="spacer"></span>
  <button class="toggle" id="modeToggle" aria-pressed="false" title="Switch between hospital and community language">Hospital view</button>
  <button class="provbtn" id="provBtn" aria-haspopup="dialog">Provenance</button>
</header>

<div class="wrap">
  <aside class="rail" aria-label="Cohort and patient selection">
    <div class="section" id="overview">
      <h2>Cohort overview</h2>
      <div class="ovgrid" id="ovGrid"></div>
      <div id="ovStates"></div>
      <details><summary class="hint">Full-comparison rate by group</summary><div id="ovStrata"></div></details>
      <p class="hint" style="margin:.4rem 0 0">There is no average patient — this is the population you read against.</p>
    </div>
    <div class="section">
      <h2>Find &amp; filter</h2>
      <label class="fld" for="q">Search patient id</label>
      <input type="search" id="q" placeholder="e.g. 62161" aria-label="Search patient id" autocomplete="off">
      <label class="fld">State</label>
      <div class="chips" id="fState" role="group" aria-label="Filter by state"></div>
      <label class="fld">Age band</label>
      <div class="chips" id="fBand" role="group" aria-label="Filter by age band"></div>
      <label class="fld">Sex</label>
      <div class="chips" id="fSex" role="group" aria-label="Filter by sex"></div>
      <label class="fld">Signal</label>
      <div class="chips" id="fSig" role="group" aria-label="Filter by signal"></div>
      <label class="fld" for="sort">Sort by</label>
      <select id="sort" aria-label="Sort patients">
        <option value="id">Patient id</option>
        <option value="coh">Least well-fitting results first</option>
        <option value="nsurp">Most unexpected results first</option>
        <option value="ageA">Age (youngest first)</option>
        <option value="ageD">Age (oldest first)</option>
      </select>
    </div>
    <div class="count" id="count" aria-live="polite"></div>
    <div class="listwrap" id="listwrap" tabindex="0" role="listbox" aria-label="Patient list" aria-activedescendant="">
      <div class="vport" id="vport"></div>
    </div>
  </aside>

  <main class="main" id="detail" aria-live="polite">
    <p class="hint">Select a patient from the list to view their Passport.</p>
  </main>
</div>

<dialog id="provDlg" aria-label="Provenance and reproducibility">
  <h3 style="margin-top:0">Provenance</h3>
  <div class="prov" id="provText"></div>
  <div style="text-align:right;margin-top:.6rem"><button class="provbtn" id="provClose">Close</button></div>
</dialog>

<footer id="foot"></footer>

<script id="bundle" type="application/json">__BUNDLE__</script>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById('bundle').textContent);
const P = DATA.patients, OV = DATA.overview;
const GLYPH = {DESCRIBE:'\u25CF', ABSTAIN:'\u25D1', REFUSE:'\u25CB'};
const CLIN = {"state_chip": {"DESCRIBE": {"hospital": "Full comparison", "community": "Full picture"}, "ABSTAIN": {"hospital": "Shown separately", "community": "One at a time"}, "REFUSE": {"hospital": "Check data", "community": "Check entries"}}, "lead_sentence": {"DESCRIBE": {"hospital": "We can compare this patient's whole set of results against similar people.", "community": "We can show how all these results compare with other people."}, "ABSTAIN": {"hospital": "We can't confidently combine these results, so each one is shown on its own.", "community": "We're not sure enough to combine these, so each result is shown separately."}, "REFUSE": {"hospital": "These results don't form a valid profile - please check for a data or measurement error.", "community": "These results don't look right together - please check they were entered correctly."}}, "coherence_header": {"hospital": "How well the results fit together", "community": "Do these results fit together?"}, "coherence_sentence_template": {"hospital": "Taken together, this combination of results is {pct}.", "community": "Put together, these results are {pct}."}, "coherence_driver_phrase": {"hospital": "out of step with the other results", "community": "doesn't match the other results"}, "standout_header": {"hospital": "What stands out", "community": "What to look at"}, "standout_hint": {"hospital": "These results are unexpected when taken together - each may look fine on its own.", "community": "These results are surprising as a group, even though each one looks okay by itself."}, "abstain_card_header": {"hospital": "Why we're showing each result separately", "community": "Why each result is shown on its own"}, "axis_table_header_describe": {"hospital": "Where each result sits", "community": "How each result compares"}, "axis_table_header_abstain": {"hospital": "Each result on its own", "community": "Each result by itself"}, "col_population_position": {"hospital": "Compared with others", "community": "Compared with others"}, "col_how_common": {"hospital": "How common", "community": "How common"}, "accountability": {"hospital": "PORTRAIT gives information to support your judgement - it does not make clinical decisions. You remain responsible for any clinical judgement.", "community": "This tool shows information only. It does not make decisions. Any clinical judgement stays with the clinician."}};
const L1 = (o)=> (o&&o[MODE]!=null)?o[MODE]:(o&&o.hospital)||'';
const esc = s => String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const pct = c => (c==null?'\u2014':(Math.round(c*100)+'th'));
const posPhrase = c => (c==null?'\u2014':('higher than '+Math.round(c*100)+' of every 100 people'));
let MODE='hospital', SEL=null;

// ---------- cohort overview ----------
function renderOverview(){
  const g=document.getElementById('ovGrid');
  g.innerHTML =
    cell(OV.n_real,'patients')+
    cell(Math.round(OV.describable_rate*100)+'%','full comparison possible')+
    cell(OV.coherence_fired,'flagged: results don\u2019t fit together');
  const s=OV.states, tot=OV.n_real;
  document.getElementById('ovStates').innerHTML =
    ['DESCRIBE','ABSTAIN','REFUSE'].map(k=>{
      const n=s[k]||0, w=Math.max(1,Math.round(100*n/tot));
      const col=k==='DESCRIBE'?'var(--describe)':k==='ABSTAIN'?'var(--abstain)':'var(--refuse)';
      return `<div class="barrow"><span class="k">${GLYPH[k]} ${esc(L1(CLIN.state_chip[k]))}</span><span class="bar"><span style="width:${w}%;background:${col}"></span></span><span>${n}</span></div>`;
    }).join('');
  document.getElementById('ovStrata').innerHTML = Object.entries(OV.strata).map(([k,v])=>{
    const w=Math.round(v.rate*100);
    return `<div class="barrow"><span class="k">${esc(k)}</span><span class="bar"><span style="width:${w}%;background:var(--describe)"></span></span><span>${w}%</span></div>`;
  }).join('');
  function cell(n,l){return `<div class="ovcell"><div class="num">${esc(n)}</div><div class="lab">${esc(l)}</div></div>`;}
}

// ---------- filters ----------
const F={state:new Set(),band:new Set(),sex:new Set(),sig:new Set(),q:'',sort:'id'};
function chipHost(id,items,key){
  const host=document.getElementById(id);
  host.innerHTML=items.map(([val,lab])=>`<button class="chip" role="button" aria-pressed="false" data-k="${key}" data-v="${esc(val)}">${esc(lab)}</button>`).join('');
}
function buildChips(){
  chipHost('fState',[['DESCRIBE',L1(CLIN.state_chip.DESCRIBE)],['ABSTAIN',L1(CLIN.state_chip.ABSTAIN)],['REFUSE',L1(CLIN.state_chip.REFUSE)]],'state');
  chipHost('fBand',[['18-39','18\u201339'],['40-59','40\u201359'],['60+','60+']],'band');
  chipHost('fSex',[['M','Male'],['F','Female']],'sex');
  chipHost('fSig',[['coh','Results don\u2019t fit together'],['s1','\u22651 unexpected result'],['s3','\u22653 unexpected results']],'sig');
  document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{
    const k=c.dataset.k,v=c.dataset.v,set=F[k];
    if(set.has(v)){set.delete(v);c.setAttribute('aria-pressed','false');}else{set.add(v);c.setAttribute('aria-pressed','true');}
    apply();
  }));
}
function matches(p){
  if(F.q && !String(p.id).toLowerCase().includes(F.q.toLowerCase())) return false;
  if(F.state.size && !F.state.has(p.state)) return false;
  if(F.band.size && !F.band.has(p.age_band)) return false;
  if(F.sex.size && !F.sex.has(p.sex)) return false;
  if(F.sig.size){
    let ok=false;
    if(F.sig.has('coh') && p.coherence_fired) ok=true;
    if(F.sig.has('s1') && (p.n_surprising||0)>=1) ok=true;
    if(F.sig.has('s3') && (p.n_surprising||0)>=3) ok=true;
    if(!ok) return false;
  }
  return true;
}
function sortFn(a,b){
  switch(F.sort){
    case 'coh': return (b.coherence_centile||-1)-(a.coherence_centile||-1);
    case 'nsurp': return (b.n_surprising||0)-(a.n_surprising||0);
    case 'ageA': return (a.age==='-'?1e9:a.age)-(b.age==='-'?1e9:b.age);
    case 'ageD': return (b.age==='-'?-1:b.age)-(a.age==='-'?-1:a.age);
    default: return String(a.id).localeCompare(String(b.id),undefined,{numeric:true});
  }
}
let VIEW=[];
function apply(){
  VIEW=P.filter(matches).sort(sortFn);
  document.getElementById('count').textContent=`${VIEW.length} of ${P.length} patients`;
  renderList();
}

// ---------- virtualised list ----------
const ROW_H=46;
const listwrap=document.getElementById('listwrap'), vport=document.getElementById('vport');
function renderList(){
  vport.style.height=(VIEW.length*ROW_H)+'px';
  drawWindow();
}
function drawWindow(){
  const top=listwrap.scrollTop, h=listwrap.clientHeight;
  const start=Math.max(0,Math.floor(top/ROW_H)-4);
  const end=Math.min(VIEW.length,Math.ceil((top+h)/ROW_H)+4);
  let html='';
  for(let i=start;i<end;i++){
    const p=VIEW[i];
    const sel = SEL && p.id===SEL.id;
    const badge = p.coherence_fired?`<span class="badge">fit ${Math.round(p.coherence_centile)}</span>`
                 : (p.n_surprising?`<span class="badge">${p.n_surprising} surprising</span>`:'');
    html+=`<div class="row" role="option" id="row-${esc(p.id)}" aria-selected="${sel?'true':'false'}" `+
          `data-i="${i}" style="top:${i*ROW_H}px;height:${ROW_H}px">`+
          `<span class="pid">${esc(p.id)}</span>`+
          `<span class="state st-${p.state}">${GLYPH[p.state]} ${p.state}</span>`+
          `<span class="meta">${p.age==='-'?'':esc(p.age)+' '+esc(p.sex)} ${badge}</span>`+
          `</div>`;
  }
  vport.innerHTML=html;
  vport.querySelectorAll('.row').forEach(r=>r.addEventListener('click',()=>select(VIEW[+r.dataset.i])));
}
listwrap.addEventListener('scroll',drawWindow);
listwrap.addEventListener('keydown',e=>{
  if(!VIEW.length) return;
  let idx = SEL?VIEW.findIndex(p=>p.id===SEL.id):-1;
  if(e.key==='ArrowDown'){e.preventDefault(); idx=Math.min(VIEW.length-1,idx+1); select(VIEW[idx],true);}
  else if(e.key==='ArrowUp'){e.preventDefault(); idx=Math.max(0,idx-1); select(VIEW[idx],true);}
});
function ensureVisible(i){
  const top=i*ROW_H, bot=top+ROW_H;
  if(top<listwrap.scrollTop) listwrap.scrollTop=top;
  else if(bot>listwrap.scrollTop+listwrap.clientHeight) listwrap.scrollTop=bot-listwrap.clientHeight;
}

// ---------- individual passport ----------
function bar(ax){
  const w=300,h=16, x=Math.round((ax.centile||0)*w);
  const lo=Math.round((ax.band_lo||0)*w), hi=Math.round((ax.band_hi||0)*w);
  const label=`${esc(ax.axis)}: ${ax.value} ${esc(ax.unit)}, ${posPhrase(ax.centile)}${ax.surprising?', unexpected given the other results':''}`;
  return `<svg width="${w}" height="${h}" role="img" aria-label="${label}" style="max-width:100%">`+
    `<rect x="0" y="5" width="${w}" height="6" rx="3" fill="var(--track)"/>`+
    `<rect x="${lo}" y="4" width="${Math.max(2,hi-lo)}" height="8" rx="4" fill="var(--band)"/>`+
    `<circle cx="${x}" cy="8" r="6" fill="${ax.surprising?'var(--describe)':'var(--marker)'}" stroke="#fff" stroke-width="1.5"/>`+
    `</svg>`;
}
const LEAD=CLIN.lead_sentence;
const ACCOUNT="";  // now mode-aware, see below
function jargonize(txt){ return MODE==='community' ? txt.replace(/r\s*=\s*-?\d+(\.\d+)?/g,'this combination looks unusual').replace(/residual/gi,'mismatch') : txt; }

function select(p,fromKey){
  SEL=p;
  const i=VIEW.findIndex(x=>x.id===p.id);
  if(i>=0){ if(fromKey) ensureVisible(i); drawWindow();
            listwrap.setAttribute('aria-activedescendant','row-'+p.id); }
  const d=document.getElementById('detail');
  let h=`<div class="banner bn-${p.state}"><span class="glyph">${GLYPH[p.state]}</span>`+
        `<span>${L1(CLIN.state_chip[p.state])}</span><span style="font-weight:400;color:var(--muted);font-size:.85rem">&nbsp;${esc(p.id)}${p.age==='-'?'':' &middot; '+esc(p.age)+' '+esc(p.sex)}</span></div>`;
  h+=`<p class="lead">${esc(LEAD[p.state][MODE])}</p>`;
  h+=`<p class="accountability">${esc(L1(CLIN.accountability))}</p>`;

  if(p.state==='DESCRIBE' && p.standout && p.standout.length){
    h+=`<div class="card flag"><h3>\u25B2 ${esc(L1(CLIN.standout_header))}</h3>`+
       `<p class="hint" style="margin-top:0">${esc(L1(CLIN.standout_hint))}</p><ul class="drivers">`;
    p.standout.forEach(s=>{
      const dir = s.direction==='high'?'unusually high':'unusually low';
      h+=`<li><b>${esc(s.axis)}</b> is ${dir} — ${esc(s.value)} ${esc(s.unit)} (${posPhrase(s.centile)}). <span class="natfreq">${esc(s.natfreq)}</span></li>`;
    });
    h+=`</ul></div>`;
  }
  // coherence card
  const c=p.coherence||{};
  if(c.assessed && c.drivers && c.drivers.some(d=>d.impossible)){
    h+=`<div class="card flag"><h3>${esc(L1(CLIN.coherence_header))}</h3>`+
       `<p style="margin:.1rem 0">${esc(L1(CLIN.coherence_sentence_template).replace("{pct}","more unusual than "+Math.round(c.centile)+" of every 100 people"))}</p><ul class="drivers">`;
    c.drivers.filter(d=>d.impossible).forEach(d=>{
      h+=`<li><b>${esc(DATA.axis_names[d.feature]||d.feature)} = ${esc(d.value)}</b> ${esc(L1(CLIN.coherence_driver_phrase))}`+
         (d.meaning?`<br><span class="meaning">${esc(jargonize(d.meaning))}</span>`:'')+`</li>`;
    });
    h+=`</ul><p class="hint">${esc(jargonize(c.note||''))}</p></div>`;
  }
  // abstain drivers
  if(p.state==='ABSTAIN'){
    const ab=p.abstention||{};
    h+=`<div class="card abst"><h3>${esc(L1(CLIN.abstain_card_header))}</h3>`+
       `<p style="margin:.1rem 0">${esc(ab.reason||'')}</p>`;
    if(ab.drivers&&ab.drivers.length){ h+=`<p class="hint">Main contributors:</p><ul class="drivers">`;
      ab.drivers.forEach(d=>h+=`<li>${esc(DATA.axis_names[d.feature]||d.feature)} (${Math.round((d.share||0)*100)}%)</li>`); h+=`</ul>`; }
    h+=`</div>`;
  }
  // axis table
  if(p.axes && p.axes.length && p.state!=='REFUSE'){
    h+=`<div class="card"><h3>${p.state==='ABSTAIN'?esc(L1(CLIN.axis_table_header_abstain)):esc(L1(CLIN.axis_table_header_describe))}</h3>`+
       `<table class="axes"><thead><tr><th scope="col">Axis</th><th scope="col">Value</th>`+
       `<th scope="col">${esc(L1(CLIN.col_population_position))}</th><th scope="col">${esc(L1(CLIN.col_how_common))}</th></tr></thead><tbody>`;
    p.axes.forEach(ax=>{
      h+=`<tr><th scope="row" class="axname">${esc(ax.axis)}${ax.surprising?'<span class="surp">unexpected</span>':''}</th>`+
         `<td>${esc(ax.value)} ${esc(ax.unit)}</td>`+
         `<td>${bar(ax)}<br><span class="natfreq">${posPhrase(ax.centile)}</span></td>`+
         `<td class="natfreq">${esc(ax.natfreq||'')}</td></tr>`;
    });
    h+=`</tbody></table></div>`;
  }
  if(p.state==='REFUSE'){
    h+=`<div class="card"><p>${esc(GLYPH.REFUSE)} No description is produced for this record.</p></div>`;
  }
  d.innerHTML=h;
}

// ---------- mode toggle + provenance ----------
document.getElementById('modeToggle').addEventListener('click',e=>{
  MODE = MODE==='hospital'?'community':'hospital';
  document.body.classList.toggle('community',MODE==='community');
  e.currentTarget.setAttribute('aria-pressed',MODE==='community'?'true':'false');
  e.currentTarget.textContent = MODE==='community'?'Community view':'Hospital view';
  if(SEL) select(SEL);
});
const dlg=document.getElementById('provDlg');
document.getElementById('provBtn').addEventListener('click',()=>{
  const pv=DATA.provenance||{};
  document.getElementById('provText').textContent =
    `method tags: ${(pv.method_tags||[]).join(', ')}\ncode sha256: ${pv.code_sha256||''}\nconfig sha256: ${pv.config_sha256||''}\n`+
    `data: ${pv.data_hash||''}\nreference n: ${DATA.reference_n}\ngenerated: ${pv.generated_utc||''}\nseed: ${pv.seed}\n\n`+
    `Regenerate: python analysis/run.py  (deterministic). Every number here is precomputed; no statistics run in this page.`;
  dlg.showModal();
});
document.getElementById('provClose').addEventListener('click',()=>dlg.close());

// ---------- boot ----------
document.getElementById('q').addEventListener('input',e=>{F.q=e.target.value;apply();});
document.getElementById('sort').addEventListener('change',e=>{F.sort=e.target.value;apply();});
document.getElementById('foot').textContent =
  `PORTRAIT research prototype \u2014 NHANES 2011\u20132012 (public), n=${OV.n_real}. Not a diagnostic or predictive device. Descriptive only; withholds a description when it cannot certify one.`;
renderOverview(); buildChips(); apply();

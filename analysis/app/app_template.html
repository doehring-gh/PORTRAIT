<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PORTRAIT — Patient Passport</title>
<style>
:root{
  --ink:#16202b; --muted:#5a6673; --line:#dfe4ea; --bg:#f4f6f9; --card:#ffffff;
  --describe:#1b7837; --abstain:#8a5a00; --refuse:#6a1b9a; --flag:#b00020;
  --band:#c3d2e6; --mark:#16202b; --focus:#0b5fff;
  --pad:1rem; --radius:10px; --fs-base:15px;
}
*{box-sizing:border-box}
html{font-size:var(--fs-base)}
body{margin:0;font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
  background:var(--bg);line-height:1.45}
a{color:var(--focus)}
:focus-visible{outline:3px solid var(--focus);outline-offset:2px;border-radius:4px}
.app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}
@media (max-width:820px){.app{grid-template-columns:1fr}}

.hdr{grid-column:1/-1;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;
  padding:.7rem 1.1rem;background:var(--card);border-bottom:1px solid var(--line)}
.brand{font-weight:800;letter-spacing:.04em;font-size:1.1rem}
.brand small{font-weight:500;color:var(--muted);letter-spacing:0}
.spacer{flex:1}
.setting{display:flex;align-items:center;gap:.5rem}
.setting .lbl{font-size:.8rem;color:var(--muted)}
.toggle{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden}
.toggle button{border:0;background:var(--card);padding:.4rem .9rem;font-size:.85rem;cursor:pointer;color:var(--muted)}
.toggle button[aria-pressed=true]{background:#16202b;color:#fff;font-weight:600}

.sidebar{background:var(--card);border-right:1px solid var(--line);padding:.6rem;overflow:auto}
.search{width:100%;padding:.5rem .6rem;border:1px solid var(--line);border-radius:8px;font-size:.9rem;margin-bottom:.5rem}
.plist{list-style:none;margin:0;padding:0}
.pcard{display:flex;align-items:center;gap:.6rem;width:100%;text-align:left;border:1px solid transparent;
  background:transparent;border-radius:8px;padding:.5rem .55rem;cursor:pointer;font:inherit}
.pcard:hover{background:#eef2f7}
.pcard[aria-current=true]{border-color:var(--focus);background:#eaf1ff}
.pcard .pid{font-weight:700;font-size:.92rem}
.pcard .pmeta{font-size:.76rem;color:var(--muted)}
.chip{margin-left:auto;font-size:.68rem;font-weight:700;padding:.15rem .45rem;border-radius:999px;border:1.5px solid;white-space:nowrap}
.chip.DESCRIBE{color:var(--describe);border-color:var(--describe)}
.chip.ABSTAIN{color:var(--abstain);border-color:var(--abstain)}
.chip.REFUSE{color:var(--refuse);border-color:var(--refuse)}

.main{padding:1.1rem 1.3rem;max-width:860px}
.banner{display:flex;align-items:center;gap:.8rem;padding:.8rem 1rem;border-radius:var(--radius);
  border:2px solid;margin-bottom:.4rem}
.banner .glyph{font-size:1.7rem;line-height:1}
.banner .word{font-size:1.15rem;font-weight:800;letter-spacing:.03em}
.banner .who{margin-left:auto;text-align:right;font-size:.82rem;color:var(--muted)}
.banner.DESCRIBE{border-color:var(--describe);background:#eaf5ee} .banner.DESCRIBE .word,.banner.DESCRIBE .glyph{color:var(--describe)}
.banner.ABSTAIN{border-color:var(--abstain);background:#fbf3e0} .banner.ABSTAIN .word,.banner.ABSTAIN .glyph{color:var(--abstain)}
.banner.REFUSE{border-color:var(--refuse);background:#f4ecf9} .banner.REFUSE .word,.banner.REFUSE .glyph{color:var(--refuse)}
.lead{font-size:1rem;margin:.5rem 0 1.1rem;color:var(--ink)}
h2{font-size:1rem;margin:1.3rem 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid var(--line)}

.axis{display:grid;grid-template-columns:150px 1fr 96px;gap:.6rem;align-items:center;padding:.28rem 0}
.axis .name{font-weight:600;font-size:.9rem}
.axis .name small{display:block;font-weight:400;color:var(--muted);font-size:.76rem}
.track{position:relative;height:20px;background:#eef1f5;border-radius:5px}
.track .bandspan{position:absolute;top:4px;height:12px;background:var(--band);border-radius:3px}
.track .mk{position:absolute;top:1px;width:3px;height:18px;background:var(--mark);border-radius:2px}
.axis .read{text-align:right;font-variant-numeric:tabular-nums;font-size:.86rem}
.axis .read .pm{color:var(--muted);font-size:.78rem}
.surp{color:var(--abstain);font-weight:700;font-size:.74rem;display:inline-flex;gap:.2rem;align-items:center}

.card{border-left:5px solid var(--line);background:var(--card);border-radius:8px;padding:.8rem 1rem;margin:.5rem 0;
  box-shadow:0 1px 2px rgba(20,32,43,.04)}
.card.ok{border-left-color:var(--describe)}
.card.flag{border-left-color:var(--flag)}
.card.abstain{border-left-color:var(--abstain);background:#fdf9ef}
.card.refuse{border-left-color:var(--refuse);background:#f8f3fc}
.card h3{margin:0 0 .35rem;font-size:.98rem;display:flex;align-items:center;gap:.4rem}
.card .glyph{font-size:1.15rem}
.drivers{margin:.4rem 0 0;padding-left:1.1rem}
.drivers li{margin:.15rem 0;font-size:.9rem}
.tag-imp{color:var(--flag);font-weight:700}
.meaning{font-size:.82rem;color:#4a2530;background:#fbeef0;border-radius:5px;padding:.3rem .5rem;margin:.25rem 0 .1rem}
.popnote{font-size:.78rem;color:var(--muted);border-top:1px dashed var(--line);margin-top:.5rem;padding-top:.4rem}
.card.standout{background:#fdeff1}
.hint{font-size:.82rem;color:var(--muted);margin-top:.5rem}

details.prov{margin-top:1.4rem;border-top:1px solid var(--line);padding-top:.5rem}
details.prov summary{cursor:pointer;font-size:.85rem;color:var(--muted);font-weight:600}
.provbody{font-size:.78rem;color:var(--muted);margin-top:.4rem;line-height:1.5;word-break:break-word}
.provbody code{background:#eef1f5;padding:.05rem .3rem;border-radius:3px}
.disclaimer{margin-top:1rem;font-size:.8rem;color:var(--muted);border-top:1px dashed var(--line);padding-top:.6rem}

body.community{--fs-base:16.5px}
body.community .tech{display:none}
body.hospital .plain-only{display:none}
</style>
</head>
<body class="hospital">
<div class="app">
  <div class="hdr">
    <div class="brand">PORTRAIT <small>&mdash; Patient Passport</small></div>
    <div class="spacer"></div>
    <div class="setting">
      <span class="lbl" id="setlbl">Setting</span>
      <div class="toggle" role="group" aria-labelledby="setlbl">
        <button id="btn-hospital" aria-pressed="true" onclick="setMode('hospital')">Hospital</button>
        <button id="btn-community" aria-pressed="false" onclick="setMode('community')">Community</button>
      </div>
    </div>
  </div>

  <nav class="sidebar" aria-label="Patient list">
    <input class="search" type="search" placeholder="Filter patients&hellip;" aria-label="Filter patients"
           oninput="filterList(this.value)">
    <ul class="plist" id="plist" role="listbox" aria-label="Patients"></ul>
  </nav>

  <main class="main" id="passport" aria-live="polite" tabindex="-1"></main>
</div>

<script>
const BUNDLE = __BUNDLE__;
let MODE = "hospital";
let CURRENT = 0;

function setMode(m){
  MODE = m;
  document.body.className = m;
  document.getElementById("btn-hospital").setAttribute("aria-pressed", m==="hospital");
  document.getElementById("btn-community").setAttribute("aria-pressed", m==="community");
  render(CURRENT);
}
function esc(s){const d=document.createElement("div");d.textContent=s==null?"":String(s);return d.innerHTML;}
function pct(x){return Math.round(x*100);}
const GLYPH={DESCRIBE:"\u25CF",ABSTAIN:"\u25D1",REFUSE:"\u25CB"};

function buildList(){
  const ul=document.getElementById("plist"); ul.innerHTML="";
  BUNDLE.patients.forEach((p,i)=>{
    const li=document.createElement("li");
    li.innerHTML='<button class="pcard" role="option" aria-current="'+(i===CURRENT)+'" '+
      'onclick="render('+i+')" data-idx="'+i+'" data-search="'+esc(p.id+' '+p.tag+' '+p.state)+'">'+
      '<span><span class="pid">'+esc(p.id)+'</span>'+
      '<span class="pmeta">'+esc(p.age_band)+' &middot; '+esc(p.sex)+' &middot; '+esc(p.tag)+'</span></span>'+
      '<span class="chip '+p.state+'">'+GLYPH[p.state]+' '+esc(p.state)+'</span></button>';
    ul.appendChild(li);
  });
}
function filterList(q){
  q=q.toLowerCase();
  document.querySelectorAll("#plist .pcard").forEach(b=>{
    b.parentElement.style.display = b.dataset.search.toLowerCase().includes(q)?"":"none";
  });
}
function axisRow(a){
  const c=pct(a.centile), lo=pct(a.band_lo), hi=pct(a.band_hi);
  const ref = a.ref_interval ? '<span class="tech">ref '+a.ref_interval[0]+'&ndash;'+a.ref_interval[1]+' '+esc(a.unit)+'</span>' : "";
  const surp = a.surprising ? ' <span class="surp" title="unusual given the other values">&#9650; '+(MODE==="community"?"stands out":"surprising")+'</span>' : "";
  return '<div class="axis"><div class="name">'+esc(a.axis)+'<small>'+a.value.toFixed(1)+' '+esc(a.unit)+' '+ref+'</small></div>'+
    '<div class="track" role="img" aria-label="'+esc(a.axis)+' centile '+c+' of 100, marginal band '+lo+' to '+hi+'">'+
    '<div class="bandspan" style="left:'+lo+'%;width:'+Math.max(1,hi-lo)+'%"></div>'+
    '<div class="mk" style="left:calc('+c+'% - 1px)"></div></div>'+
    '<div class="read">'+c+'<span class="pm"> &plusmn;'+Math.round(a.band_halfwidth*100)+'</span>'+surp+'</div></div>';
}
const LEADS={
  DESCRIBE:{hospital:"This patient falls inside the describable region; PORTRAIT gives a gated description with per-feature surprise and a coherence read.",
            community:"This person's results can be described reliably against the reference population. Below: where they sit on each measure, and whether any combination is unusual."},
  ABSTAIN:{hospital:"This patient falls outside the region where PORTRAIT can certify coverage. Only marginal position is shown; no rich description is claimed.",
           community:"PORTRAIT cannot describe this person reliably enough, so it holds back rather than guess. Only single-measure positions are shown below."},
  REFUSE:{hospital:"The reference carries no structure beyond its covariance. PORTRAIT declines to describe.",
          community:"There is no meaningful population structure here, so PORTRAIT declines to describe."}
};
function render(i){
  CURRENT=i; const p=BUNDLE.patients[i];
  document.querySelectorAll("#plist .pcard").forEach(b=>b.setAttribute("aria-current", +b.dataset.idx===i));
  const who = p.age_band==="-" ? "synthetic null probe" : esc(p.age_band)+" &middot; "+esc(p.sex)+" &middot; "+esc(p.tag);
  let html='<div class="banner '+p.state+'" role="status"><span class="glyph" aria-hidden="true">'+GLYPH[p.state]+'</span>'+
    '<span class="word">'+esc(p.state)+'</span><span class="who">'+esc(p.id)+'<br>'+who+'</span></div>';
  html+='<p class="lead">'+esc(LEADS[p.state][MODE])+'</p>';

  // ---- prominent "What stands out" block (surprise contributors, ranked) ----
  if(p.state==="DESCRIBE" && p.standout && p.standout.length){
    const items=p.standout.map(s=>{
      const dir = s.direction==="high" ? "unusually high" : "unusually low";
      return '<li><b>'+esc(s.axis)+'</b> is '+dir+' given this patient\u2019s other results &mdash; '+
             esc(s.value.toFixed(1))+' '+esc(s.unit)+' ('+pct(s.centile)+' centile)</li>';
    }).join("");
    html+='<div class="card flag standout"><h3><span class="glyph">&#9650;</span>What stands out</h3>'+
      '<div class="hint" style="margin-top:0">These values are surprising <b>in combination</b> with the rest &mdash; each may look acceptable alone.</div>'+
      '<ul class="drivers">'+items+'</ul></div>';
  }

  if(p.axes && p.axes.length){
    html+='<h2>Where this '+(MODE==="community"?"person":"patient")+' sits</h2>'+p.axes.map(axisRow).join("");
    html+='<p class="hint tech">Bands are population-<b>marginal</b> (DKW); they do not assert a per-patient guarantee (conditional coverage is provably impossible).</p>';
  }
  if(p.state==="DESCRIBE" && p.coherence && p.coherence.assessed){
    const cc=p.coherence, flagged=cc.centile>=90;
    const drivers=cc.drivers.map(d=>{
      const imp=d.impossible?' <span class="tag-imp">'+(MODE==="community"?"&mdash; this combination looks impossible":"(impossible given the rest)")+'</span>':"";
      const rtxt = MODE==="hospital"?' &mdash; conditional residual r='+d.residual.toFixed(2):"";
      const mean = d.meaning ? '<div class="meaning">'+esc(d.meaning)+'</div>' : "";
      return '<li>'+esc(BUNDLE.axis_names[d.feature]||d.feature)+' = '+d.value.toFixed(1)+' '+esc(BUNDLE.units[d.feature]||"")+rtxt+imp+mean+'</li>';
    }).join("");
    const head = flagged ? "Unusual combination of features" : "Internally coherent";
    html+='<h2>Profile coherence</h2><div class="card '+(flagged?"flag":"ok")+'"><h3><span class="glyph">'+(flagged?"&#9650;":"&#10003;")+'</span>'+head+
      '<span class="tech" style="font-weight:400;color:var(--muted)">&nbsp;(centile '+Math.round(cc.centile)+'/100)</span></h3>'+
      (MODE==="community"&&flagged?'<div>Each value on its own may look normal, but together they do not fit the usual pattern:</div>':"")+
      '<ul class="drivers">'+drivers+'</ul><div class="hint">'+esc(cc.note)+'</div>'+
      (flagged && BUNDLE.population_note ? '<div class="popnote tech">'+esc(BUNDLE.population_note)+'</div>' : "")+'</div>';
  }
  if(p.state==="ABSTAIN" && p.abstention){
    const ab=p.abstention;
    const drv=(ab.drivers||[]).map(d=>'<li>'+esc(BUNDLE.axis_names[d.feature]||d.feature)+' &mdash; '+Math.round(d.share*100)+'%</li>').join("");
    html+='<h2>Why PORTRAIT holds back here</h2><div class="card abstain"><h3><span class="glyph">&#9888;</span>Description withheld</h3>'+
      '<div>'+esc(ab.reason)+'</div>'+
      (drv?'<div class="hint tech">Largest surprise contributors:</div><ul class="drivers tech">'+drv+'</ul>':"")+
      '<div class="hint plain-only">This is a deliberate, safe choice &mdash; not a failure.</div></div>';
  }
  if(p.state==="REFUSE"){
    html+='<div class="card refuse"><h3><span class="glyph">&#9711;</span>Description refused</h3><div>'+esc(p.note)+'</div></div>';
  }
  const pr=p.provenance||BUNDLE.provenance;
  html+='<details class="prov"><summary>Provenance &amp; audit</summary><div class="provbody">'+
    'Method: '+esc((pr.method_tags||[]).join("; "))+'<br>'+
    'code <code>'+esc((pr.code_sha256||"").slice(0,12))+'</code> &middot; config <code>'+esc((pr.config_sha256||"").slice(0,12))+'</code><br>'+
    'data: '+esc(pr.data_hash)+' &middot; seed '+esc(pr.seed)+' &middot; reference n='+esc(p.reference_n)+'<br>'+
    'Regenerate: <code>python -m analysis.s7_render.orchestrate</code></div></details>';
  html+='<p class="disclaimer">Research characterisation aid. Not a diagnostic or predictive device, and not a detector. '+
    'It describes an individual\u2019s position against a reference population with calibrated marginal intervals, and '+
    'withholds a description when it cannot support one. Colour is never the sole channel.</p>';
  document.getElementById("passport").innerHTML = html;
}
document.addEventListener("keydown",e=>{
  if(e.target.tagName==="INPUT") return;
  const vis=[...document.querySelectorAll("#plist .pcard")].filter(b=>b.parentElement.style.display!=="none");
  const idx=vis.findIndex(b=>+b.dataset.idx===CURRENT);
  if(e.key==="ArrowDown"&&idx<vis.length-1){e.preventDefault();vis[idx+1].click();vis[idx+1].focus();}
  if(e.key==="ArrowUp"&&idx>0){e.preventDefault();vis[idx-1].click();vis[idx-1].focus();}
});
buildList(); render(0);
</script>
</body>
</html>
